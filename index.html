<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader Water Pond Sample</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
    canvas { display: block; }
    #time-panel {
      position: fixed;
      top: 16px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: rgba(255, 255, 255, 0.85);
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }
    #clock {
      font-size: 1.4rem;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    }
    #time-slider {
      width: 190px;
      accent-color: #4fc3ad;
      cursor: pointer;
      pointer-events: auto;
    }
    #live-button {
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.6);
      background: rgba(10, 16, 28, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 4px 12px;
      cursor: pointer;
      pointer-events: auto;
    }
    #live-button::before {
      content: '● ';
      color: rgba(255, 255, 255, 0.35);
    }
    #live-button:hover { color: rgba(255, 255, 255, 0.9); }
    #live-button.active {
      color: rgba(255, 255, 255, 0.9);
      cursor: default;
    }
    #live-button.active::before { color: #6fe7a8; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.166.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="time-panel">
    <div id="clock"></div>
    <input id="time-slider" type="range" min="0" max="1439" step="1" aria-label="Time of day" />
    <button id="live-button" type="button" title="Follow real time">live</button>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
